<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceApp — Redesign Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #181d26;
      --ink: #181d26;
      --body: #333840;
      --muted: #41454d;
      --hairline: #e8e8e8;
      --canvas: #ffffff;
      --surface-soft: #f8fafc;
      --surface-mid: #f0f2f5;
      --sig-coral: #aa2d00;
      --sig-forest: #0a2e0e;
      --sig-cream: #f5e9d4;
      --sig-peach: #fcab79;
      --sig-mint: #a8d8c4;
      --sig-mint-dark: #2e7d65;
      --sig-yellow: #f4d35e;
      --sig-mustard: #c8912a;
      --sig-coral-light: #fff1ec;
      --sig-mint-light: #eef8f4;
      --sig-mustard-light: #fdf6e3;
      --success: #1a7a3c;
      --success-bg: #e8f5ee;
      --danger: #c0392b;
      --danger-bg: #fdecea;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    }

    html, body, #root { height: 100%; width: 100%; }

    body {
      font-family: var(--font);
      background: var(--surface-soft);
      color: var(--ink);
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 220px;
      background: var(--canvas);
      border-right: 1px solid var(--hairline);
      display: flex;
      flex-direction: column;
      padding: 24px 0 16px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 0 20px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--hairline);
      margin-bottom: 16px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 20px;
      height: 20px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.3px;
    }

    .nav-group-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 8px 20px 4px;
      opacity: 0.6;
    }

    .nav-list {
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .nav-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--body);
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item:hover {
      background: var(--surface-soft);
      color: var(--ink);
    }

    .nav-item.active {
      background: var(--surface-soft);
      color: var(--ink);
      font-weight: 600;
    }

    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .nav-item.active .nav-dot {
      background: var(--sig-coral);
    }

    .nav-item:not(.active) .nav-dot {
      background: var(--hairline);
    }

    .sidebar-user {
      padding: 16px 20px 0;
      border-top: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      flex-shrink: 0;
    }

    .user-info-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
    }

    .user-info-sub {
      font-size: 11px;
      color: var(--muted);
    }

    /* ========== MAIN ========== */
    .main-content {
      flex: 1;
      overflow-y: auto;
      background: var(--surface-soft);
    }

    /* ========== HERO BANDS ========== */
    .hero-band {
      padding: 36px 40px 36px;
      position: relative;
      overflow: visible;
    }

    .hero-actions {
      position: absolute;
      top: 28px;
      right: 40px;
      display: flex;
      gap: 8px;
    }

    .hero-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      transition: opacity 0.15s, transform 0.1s;
    }

    .hero-btn:active { transform: scale(0.97); }

    .hero-btn.primary {
      background: white;
      color: var(--ink);
    }

    .hero-btn.primary:hover { opacity: 0.9; }

    .hero-btn.ghost {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .hero-btn.ghost:hover { background: rgba(255,255,255,0.25); }

    .hero-btn.ghost-dark {
      background: rgba(0,0,0,0.07);
      color: var(--ink);
      border: 1px solid rgba(0,0,0,0.12);
    }

    .hero-btn.ghost-dark:hover { background: rgba(0,0,0,0.12); }

    .hero-band.forest { background: var(--sig-forest); color: white; }
    .hero-band.coral { background: var(--sig-coral); color: white; }
    .hero-band.mint { background: var(--sig-mint-dark); color: white; }
    .hero-band.mustard { background: var(--sig-mustard); color: white; }
    .hero-band.peach { background: #e8874a; color: white; }
    .hero-band.cream { background: var(--sig-cream); color: var(--ink); }
    .hero-band.dark { background: var(--primary); color: white; }

    .hero-period-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }

    .period-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      color: rgba(255,255,255,0.8);
      transition: all 0.15s;
    }

    .period-tab.dark {
      border-color: rgba(0,0,0,0.15);
      color: rgba(0,0,0,0.6);
    }

    .period-tab.active {
      background: white;
      color: var(--ink);
      border-color: white;
      font-weight: 600;
    }

    .period-tab.active.dark {
      background: var(--ink);
      color: white;
      border-color: var(--ink);
    }

    .hero-kpi-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-kpi {
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 16px 20px;
      min-width: 150px;
      backdrop-filter: blur(4px);
    }

    .hero-kpi.dark-bg {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.1);
    }

    .hero-kpi-label {
      font-size: 11px;
      opacity: 0.75;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    .hero-kpi-value {
      font-size: 28px;
      font-weight: 400;
      line-height: 1.1;
    }

    .hero-kpi-sub {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    /* ========== PAGE BODY ========== */
    .page-body {
      padding: 28px 40px 48px;
    }

    /* ========== SECTION ========== */
    .section {
      margin-bottom: 36px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--hairline);
    }

    /* ========== GRIDS ========== */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

    /* ========== CARDS ========== */
    .card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 20px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--body);
      margin-bottom: 14px;
    }

    /* ========== METRIC CARDS ========== */
    .kpi-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kpi-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      align-self: flex-start;
    }

    .kpi-chip.coral { background: var(--sig-coral-light); color: var(--sig-coral); }
    .kpi-chip.mint { background: var(--sig-mint-light); color: var(--sig-mint-dark); }
    .kpi-chip.mustard { background: var(--sig-mustard-light); color: var(--sig-mustard); }
    .kpi-chip.cream { background: var(--sig-cream); color: #7a5a20; }

    .kpi-value {
      font-size: 28px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.2;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--muted);
    }

    /* ========== CHART BARS ========== */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bar-label {
      font-size: 12px;
      color: var(--body);
      width: 70px;
      flex-shrink: 0;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 10px;
      background: var(--surface-mid);
      border-radius: 5px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease;
    }

    .bar-value {
      font-size: 12px;
      color: var(--muted);
      width: 48px;
      flex-shrink: 0;
      text-align: right;
    }

    /* ========== MINI TREND ========== */
    .trend-sparkline {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 40px;
    }

    .spark-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      min-height: 4px;
    }

    /* ========== TABLE ========== */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--hairline);
      text-align: left;
    }

    .data-table td {
      font-size: 13px;
      color: var(--body);
      padding: 11px 12px;
      border-bottom: 1px solid var(--hairline);
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table td:last-child {
      text-align: right;
      font-weight: 500;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .tag.shared { background: var(--sig-mint-light); color: var(--sig-mint-dark); }
    .tag.personal { background: var(--sig-mustard-light); color: var(--sig-mustard); }
    .tag.positive { color: var(--success); }
    .tag.negative { color: var(--danger); }

    /* ========== INSIGHT CARDS ========== */
    .insight-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .insight-item {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-left: 3px solid;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .insight-item.coral { border-left-color: var(--sig-coral); }
    .insight-item.mint { border-left-color: var(--sig-mint-dark); }
    .insight-item.mustard { border-left-color: var(--sig-mustard); }

    .insight-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .insight-content-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .insight-content-text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ========== DEBT CARDS ========== */
    .debt-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 18px;
    }

    .debt-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .debt-card-amount {
      font-size: 22px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .progress-track {
      height: 6px;
      background: var(--surface-mid);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
    }

    .debt-card-sub {
      font-size: 11px;
      color: var(--muted);
    }

    /* ========== PORTFOLIO CARD ========== */
    .portfolio-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 20px;
    }

    .portfolio-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .portfolio-sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .portfolio-value {
      font-size: 28px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .portfolio-meta {
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .apy-badge {
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ========== SHARED BALANCE CARDS ========== */
    .ledger-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 20px;
    }

    .ledger-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .ledger-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid var(--hairline);
    }

    .ledger-row:last-child { border-bottom: none; }

    .ledger-row .label { color: var(--muted); }

    /* ========== SETTINGS ========== */
    .settings-card {
      background: var(--canvas);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .settings-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--hairline);
      font-size: 13px;
    }

    .settings-row:last-child { border-bottom: none; }

    .settings-row .key { color: var(--body); }

    .settings-row .val {
      color: var(--muted);
      font-size: 12px;
    }

    .settings-btn {
      padding: 8px 16px;
      background: var(--surface-soft);
      border: 1px solid var(--hairline);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink);
    }

    .settings-btn.danger {
      background: var(--danger-bg);
      border-color: #f5c6c4;
      color: var(--danger);
    }

    .category-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--hairline);
      font-size: 13px;
    }

    .category-row:last-child { border-bottom: none; }

    .cat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cat-name { flex: 1; color: var(--body); }

    .cat-budget {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface-soft);
      padding: 3px 8px;
      border-radius: 4px;
    }

    @media (max-width: 1100px) {
      .hero-band, .page-body { padding-left: 24px; padding-right: 24px; }
      .grid-5 { grid-template-columns: repeat(3, 1fr); }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .grid-5, .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState } = React;

    const fmt = (v) => {
      if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
      if (v >= 1000) return '$' + (v/1000).toFixed(1) + 'k';
      return '$' + v.toLocaleString();
    };

    /* ---- PERIOD TABS ---- */
    const PeriodTabs = ({ value, onChange, dark = false }) => (
      <div style={{ display: 'flex', gap: '4px', marginBottom: '20px' }}>
        {['Month', 'Quarter', 'Year', 'All Time'].map(p => (
          <button
            key={p}
            className={`period-tab ${dark ? 'dark' : ''} ${value === p ? 'active' : ''}`}
            onClick={() => onChange(p)}
          >
            {p}
          </button>
        ))}
      </div>
    );

    /* ---- SIMPLE BAR CHART (CSS) ---- */
    const BarChart = ({ data, color = '#aa2d00' }) => (
      <div className="bar-chart">
        {data.map((d, i) => (
          <div className="bar-row" key={i}>
            <div className="bar-label">{d.label}</div>
            <div className="bar-track">
              <div className="bar-fill" style={{ width: d.pct + '%', background: color }} />
            </div>
            <div className="bar-value">{d.value}</div>
          </div>
        ))}
      </div>
    );

    /* ---- SPARKLINE BARS ---- */
    const Sparkline = ({ data, color = '#aa2d00' }) => {
      const max = Math.max(...data);
      return (
        <div className="trend-sparkline">
          {data.map((v, i) => (
            <div key={i} className="spark-bar"
              style={{ height: (v / max * 100) + '%', background: i === data.length - 1 ? color : color + '55' }}
            />
          ))}
        </div>
      );
    };

    /* ============================
       PAGES
       ============================ */

    const DashboardPage = ({ period, setPeriod }) => (
      <div>
        <div className="hero-band forest">
          <div className="hero-actions">
            <button className="hero-btn ghost">+ Add Transaction</button>
          </div>
          <PeriodTabs value={period} onChange={setPeriod} />
          <div className="hero-kpi-row">
            <div className="hero-kpi">
              <div className="hero-kpi-label">Net Flow</div>
              <div className="hero-kpi-value">$98.3k</div>
              <div className="hero-kpi-sub">+12.4% vs last month</div>
            </div>
            <div className="hero-kpi">
              <div className="hero-kpi-label">Income</div>
              <div className="hero-kpi-value">$84.9k</div>
              <div className="hero-kpi-sub">4 paychecks</div>
            </div>
            <div className="hero-kpi">
              <div className="hero-kpi-label">Expenses</div>
              <div className="hero-kpi-value">$76.4k</div>
              <div className="hero-kpi-sub">↑ $46.6k vs Mar</div>
            </div>
            <div className="hero-kpi">
              <div className="hero-kpi-label">Debt Paid</div>
              <div className="hero-kpi-value">$67.0k</div>
              <div className="hero-kpi-sub">5 cards</div>
            </div>
          </div>
        </div>

        <div className="page-body">
          <div className="section">
            <div className="section-title">Portfolio & Wealth</div>
            <div className="grid-3">
              <div className="kpi-card">
